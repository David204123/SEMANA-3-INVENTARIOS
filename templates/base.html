<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Inventario{% endblock %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f3f4f6;
            margin: 0;
        }

        .navbar {
            background: #111827;
            color: white;
            padding: 16px 40px;
            font-size: 20px;
            font-weight: bold;
        }

        .container {
            width: 85%;
            max-width: 1000px;
            margin: 35px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
        }

        h1 {
            margin-top: 0;
            color: #111827;
        }

        .btn {
            display: inline-block;
            padding: 9px 14px;
            background: #2563eb;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            border: none;
            cursor: pointer;
        }

        .btn-secondary {
            background: #6b7280;
        }

        .btn-danger {
            background: #dc2626;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 22px;
        }

        th {
            background: #f9fafb;
            text-align: left;
            padding: 12px;
        }

        td {
            padding: 12px;
            border-top: 1px solid #e5e7eb;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 14px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .acciones a {
            margin-right: 8px;
            text-decoration: none;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .small {
            color: #6b7280;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="navbar" style="display:flex; justify-content:space-between; align-items:center;">
    <div>Sistema de Inventario</div>

    <div>
        <a href="{{ url_for('dashboard') }}" style="color:white; margin-right:15px; text-decoration:none;">
            Dashboard
        </a>

        <a href="{{ url_for('productos') }}" style="color:white; margin-right:15px; text-decoration:none;">
            Productos
        </a>

        <a href="{{ url_for('logout') }}" style="color:white; text-decoration:none;">
            Cerrar sesión
        </a>
    </div>
</div>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
